apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-cfo-service
  namespace: kharchabuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-cfo-service
  template:
    metadata:
      labels:
        app: ai-cfo-service
    spec:
      containers:
      - name: ai-cfo-service
        image: kharchabuddy/ai-cfo-service:latest
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: mongodb-uri
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: openai-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: gemini-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-cfo-service
  namespace: kharchabuddy
spec:
  selector:
    app: ai-cfo-service
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-cfo-service-hpa
  namespace: kharchabuddy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-cfo-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
