apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-engine
  namespace: kharchabuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prediction-engine
  template:
    metadata:
      labels:
        app: prediction-engine
    spec:
      containers:
      - name: prediction-engine
        image: kharchabuddy/prediction-engine:latest
        ports:
        - containerPort: 3005
        env:
        - name: PORT
          value: "3005"
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: mongodb-uri
        - name: TIMESCALEDB_URI
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: timescaledb-uri
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: prediction-engine
  namespace: kharchabuddy
spec:
  selector:
    app: prediction-engine
  ports:
  - port: 3005
    targetPort: 3005
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prediction-engine-hpa
  namespace: kharchabuddy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prediction-engine
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
