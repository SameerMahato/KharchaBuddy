apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kharchabuddy
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      containers:
      - name: gateway
        image: kharchabuddy/gateway:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: jwt-secret
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:3001"
        - name: EXPENSE_SERVICE_URL
          value: "http://expense-service:3002"
        - name: BUDGET_SERVICE_URL
          value: "http://budget-service:3003"
        - name: AI_CFO_SERVICE_URL
          value: "http://ai-cfo-service:3004"
        - name: PREDICTION_SERVICE_URL
          value: "http://prediction-service:3005"
        - name: SOCIAL_FINANCE_SERVICE_URL
          value: "http://social-finance-service:3006"
        - name: WEALTH_BUILDER_SERVICE_URL
          value: "http://wealth-builder-service:3007"
        - name: TAX_OPTIMIZER_SERVICE_URL
          value: "http://tax-optimizer-service:3008"
        - name: INTEGRATION_SERVICE_URL
          value: "http://integration-service:3009"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kharchabuddy
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: kharchabuddy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
