# Social Finance Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-finance
  namespace: kharchabuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: social-finance
  template:
    metadata:
      labels:
        app: social-finance
    spec:
      containers:
      - name: social-finance
        image: kharchabuddy/social-finance:latest
        ports:
        - containerPort: 3006
        env:
        - name: PORT
          value: "3006"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: mongodb-uri
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: social-finance
  namespace: kharchabuddy
spec:
  selector:
    app: social-finance
  ports:
  - port: 3006
    targetPort: 3006
