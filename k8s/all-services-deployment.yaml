  template:
    metadata:
      labels:
        app: integration-service
    spec:
      containers:
      - name: integration-service
        image: kharchabuddy/integration-service:latest
        ports:
        - containerPort: 3009
        env:
        - name: PORT
          value: "3009"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: mongodb-uri
        - name: SETU_API_KEY
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: setu-api-key
        - name: FINBOX_API_KEY
          valueFrom:
            secretKeyRef:
              name: kharchabuddy-secrets
              key: finbox-api-key
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
